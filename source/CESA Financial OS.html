<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CESA Financial OS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data + Theme (plain JS) -->
  <script src="src/data.js"></script>
  <script src="src/theme.js"></script>
  <script>
    // Apply initial theme synchronously to avoid flash
    window.applyCESATheme('linear');
  </script>

  <!-- UI primitives & Charts (JSX) -->
  <script type="text/babel" data-presets="env,react" src="src/ui.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/charts.jsx"></script>

  <!-- Screens (JSX) -->
  <script type="text/babel" data-presets="env,react" src="src/screens-core.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens-ops.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens-meta.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens-plan.jsx"></script>

  <!-- Tweaks panel scaffold -->
  <script type="text/babel" data-presets="env,react" src="src/tweaks-panel.jsx"></script>

  <!-- App entry -->
  <script type="text/babel" data-presets="env,react" src="src/app.jsx"></script>
</body>
</html>
